<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire d'adhésion à l'ONG</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Formulaire d'adhésion à l'ONG</h1>
    <form action="submit.php" method="post" enctype="multipart/form-data" class="row g-3">
        <div class="col-md-6">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nom" name="nom" required>
        </div>
        <div class="col-md-6">
            <label for="prenom" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="prenom" name="prenom" required>
        </div>
        <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="col-md-6">
            <label for="telephone" class="form-label">Téléphone</label>
            <input type="tel" class="form-control" id="telephone" name="telephone" required>
        </div>
        <div class="col-md-6">
            <label for="nationalite" class="form-label">Nationalité</label>
            <input type="text" class="form-control" id="nationalite" name="nationalite" required>
        </div>
        <div class="col-md-6">
            <label for="adresse" class="form-label">Adresse postale</label>
            <textarea class="form-control" id="adresse" name="adresse" rows="2" required></textarea>
        </div>
        <div class="col-md-6">
            <label for="type_adhesion" class="form-label">Type d'adhésion</label>
            <select id="type_adhesion" name="type_adhesion" class="form-select" required>
                <option value="benevole">Bénévole</option>
                <option value="donateur">Donateur</option>
                <option value="membre_actif">Membre actif</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="cv" class="form-label">CV (PDF)</label>
            <input type="file" class="form-control" id="cv" name="cv" accept="application/pdf" required>
        </div>
        <div class="col-md-6">
            <label for="piece_id" class="form-label">Pièce d'identité</label>
            <input type="file" class="form-control" id="piece_id" name="piece_id" accept="application/pdf,image/*" required>
        </div>
        <div class="col-12 form-check mt-3">
            <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
            <label class="form-check-label" for="terms">J'accepte les conditions d'adhésion</label>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary mt-3">Envoyer</button>
        </div>
    </form>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>
<script>
const input = document.querySelector('#telephone');
const form = document.querySelector('form');
const iti = window.intlTelInput(input, {
    preferredCountries: ['fr', 'us'],
    separateDialCode: true,
    utilsScript: 'https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js'
});
form.addEventListener('submit', () => {
    input.value = iti.getNumber();
});
</script>
</body>
</html>
